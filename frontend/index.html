<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receipt Parser</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container-fluid px-3">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <div class="brand-text">
                    Receipt<span class="text-muted fw-normal">Parser</span>
                    <span class="badge outline-badge ms-1">AI</span>
                </div>
            </a>
            <div class="ms-auto d-flex gap-2">
                <button class="btn btn-custom-outline" id="changeApiKeyBtn">
                    <i class="bi bi-key me-1"></i> API Key
                </button>
                <button class="btn btn-custom-solid shadow-sm" id="addReceiptBtn">
                    <i class="bi bi-cloud-upload me-1"></i> Upload
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mt-5">
        <!-- Receipts Table -->
        <div class="table-container">
            <h4 class="mb-4">Recent Scans</h4>
            <div class="table-responsive">
                <table class="table table-hover" id="receiptsTable">
                    <thead>
                        <tr>
                            <th>Store</th>
                            <th>Total (€)</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Receipts dynamically loaded -->
                    </tbody>
                </table>
            </div>
        </div>
        <!-- Pagination -->
        <nav>
            <ul class="pagination justify-content-center" id="pagination">
                <!-- Pagination links dynamically added -->
            </ul>
        </nav>
    </div>

    <!-- Add Receipt Modal -->
    <div class="modal fade" id="receiptModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0">
                <div class="modal-header border-bottom-0 pb-0">
                    <h5 class="modal-title">Upload Receipt</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="uploadForm">
                        <div class="mb-4">
                            <label for="fileInput" class="form-label text-muted small fw-medium">Select Image</label>
                            <input type="file" class="form-control form-control-lg" id="fileInput" accept="image/*" required>
                        </div>
                        <div id="uploadMessage" class="mt-3"></div>
                        <button type="submit" class="btn btn-custom-solid w-100 py-2" id="uploadBtn">
                            <span id="uploadSpinner" class="spinner-border spinner-border-sm d-none me-2" role="status" aria-hidden="true"></span>
                            <span id="uploadBtnText">Process Receipt</span>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>


    <!-- API Key Modal -->
    <div class="modal fade" id="apiKeyModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0">
                <div class="modal-header border-bottom-0 pb-0">
                    <h5 class="modal-title">API Configuration</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <label class="form-label text-muted small fw-medium">OpenAI API Key</label>
                    <input type="password" class="form-control form-control-lg" id="apiKeyInput" placeholder="sk-proj-..." required>
                    <small class="text-muted mt-2 d-block"><i class="bi bi-info-circle me-1"></i>Type 'test' to simulate data without connecting to the API.</small>
                </div>
                <div class="modal-footer border-top-0 pt-0">
                    <button class="btn btn-custom-solid w-100" id="saveApiKeyBtn">Save Configuration</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Receipt Details Modal -->
    <div class="modal fade" id="detailsModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content border-0">
                <div class="modal-header border-bottom-0 pb-0">
                    <h5 class="modal-title">Scanned Receipt</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <table class="table w-100">
                        <thead>
                            <tr>
                                <th>Product</th>
                                <th class="text-center">Qty</th>
                                <th class="text-end">Price (€)</th>
                                <th>Category</th>
                            </tr>
                        </thead>
                        <tbody id="detailsTableBody">
                            <!-- Details dynamically loaded -->
                        </tbody>
                    </table>
                </div>
                <div class="modal-footer border-top-0 pt-0">
                    <div class="d-flex w-100 justify-content-between">
                         <button type="button" class="btn btn-custom-outline" data-bs-dismiss="modal">Close</button>
                         <button type="button" class="btn btn-custom-solid" id="exportCsvBtn" style="display: none;">
                            <i class="bi bi-download me-1"></i> Export CSV
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
